name: Refresh CRCL Tracker

# 每天 UTC 22:00（北京时间次日 06:00）+ 美股开盘后 1 小时 UTC 14:30
on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '30 14 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run build.py to refresh data
        run: python build.py
      - name: Commit & push if HTML changed
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "auto: refresh data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes — skip commit"
          fi

  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
